    <script>
        var counter = 0;
    
        function changeText() {
            var quotes = new Array();
    
            quotes[0] = "";
            quotes[1] = "Frontend Developer";
    
            quotes[2] = "";
            quotes[3] = "Content Writer";
            quotes[4] = "";
            quotes[5] = "Grammar Nazi";
            quotes[6] = "";
            quotes[7] = "Polygot";
            quotes[8] = "";
            quotes[9] = "<span style='color: #000000;'>Batman</span>"; // Batman quote
            quotes[10] = "";
    
            var textSlide = document.getElementById("textslide");
            textSlide.style.opacity = 0;
    
            if (counter > 9) {
                counter = 0;
            }
    
            setTimeout(function () {
                textSlide.innerHTML = quotes[counter];
                textSlide.style.opacity = 1;
            }, 500);
    
            setTimeout(function () {
                textSlide.style.opacity = 0;
            }, 20000);
    
            setTimeout(function () {
                changeText();
            }, 2000);
    
            counter++;
        }
    </script>
